name: Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HealthSync
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_URL }}/health)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: service returned $STATUS"
            exit 1
          fi
